name: Test MCP Base Compatibility

on:
  push:
    branches: ['12.0', '13.0', '14.0', '15.0', '16.0', '17.0', '18.0', '19.0']
  pull_request:
    branches: [main, '12.0', '13.0', '14.0', '15.0', '16.0', '17.0', '18.0', '19.0']

jobs:
  test-12:
    runs-on: ubuntu-latest
    if: >
      github.ref == 'refs/heads/12.0' ||
      (github.event_name == 'pull_request' && github.base_ref == '12.0')
    
    services:
      postgres:
        image: postgres:12
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Run tests with Odoo 12.0 Docker
        run: |
          # Wait for PostgreSQL to be ready
          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U odoo; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          
          docker run --rm \
            --network host \
            -v $(pwd):/mnt/extra-addons \
            -e HOST=localhost \
            -e PORT=5432 \
            -e USER=odoo \
            -e PASSWORD=odoo \
            odoo:12.0 \
            odoo -i mcp_base \
                 --test-enable \
                 --test-tags /mcp_base \
                 --stop-after-init \
                 -d test_mcp_12.0 \
                 --db_host=localhost \
                 --db_port=5432 \
                 --db_user=odoo \
                 --db_password=odoo \
                 --log-level=warn
        env:
          PGPASSWORD: odoo

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: odoo-logs-12.0
          path: /var/lib/odoo/.local/share/Odoo/log/
          retention-days: 7

