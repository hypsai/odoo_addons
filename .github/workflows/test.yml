name: Test MCP Base Compatibility

on:
  push:
    branches: ['12.0', '13.0', '14.0', '15.0', '16.0', '17.0', '18.0', '19.0']
  pull_request:
    branches: [main, '12.0', '13.0', '14.0', '15.0', '16.0', '17.0', '18.0', '19.0']

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Map branch to Odoo version for testing
    strategy:
      matrix:
        odoo-version: ['12.0', '13.0', '14.0', '15.0', '16.0', '17.0', '18.0', '19.0']
        postgres-version: ['12', '12', '12', '15', '15', '15', '15', '15']
        include:
          - odoo-version: '12.0'
            postgres-version: '12'
          - odoo-version: '13.0'
            postgres-version: '12'
          - odoo-version: '14.0'
            postgres-version: '12'
          - odoo-version: '15.0'
            postgres-version: '15'
          - odoo-version: '16.0'
            postgres-version: '15'
          - odoo-version: '17.0'
            postgres-version: '15'
          - odoo-version: '18.0'
            postgres-version: '15'
          - odoo-version: '19.0'
            postgres-version: '15'
      
      fail-fast: false
    
    # Only run for matching branch or PR target
    if: >
      github.ref == format('refs/heads/{0}', matrix.odoo-version) ||
      (github.event_name == 'pull_request' && github.base_ref == matrix.odoo-version)
    
    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run tests with Odoo ${{ matrix.odoo-version }} Docker
        run: |
          docker run --rm \
            --network host \
            -v $(pwd):/mnt/extra-addons \
            odoo:${{ matrix.odoo-version }} \
            odoo -i mcp_base \
                 --test-enable \
                 --test-tags /mcp_base \
                 --stop-after-init \
                 -d test_mcp_${{ matrix.odoo-version }} \
                 --db_host=localhost \
                 --db_port=5432 \
                 --db_user=odoo \
                 --db_password=odoo \
                 --log-level=warn 2>&1 | tee /tmp/odoo_output.log
        env:
          PGPASSWORD: odoo

      - name: Check test results
        run: |
          if grep -q "FAIL\|ERROR" /tmp/odoo_output.log; then
            echo "❌ Tests failed for Odoo ${{ matrix.odoo-version }}!"
            grep -A 5 "FAIL\|ERROR" /tmp/odoo_output.log || true
            exit 1
          else
            echo "✅ All tests passed for Odoo ${{ matrix.odoo-version }}!"
          fi

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: odoo-logs-${{ matrix.odoo-version }}
          path: /tmp/odoo_output.log
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linting tools
        run: |
          pip install pylint
          pip install pylint-odoo

      - name: Run pylint
        run: |
          pylint --load-plugins=pylint_odoo \
                 --rcfile=/dev/null \
                 mcp_base/ || true
