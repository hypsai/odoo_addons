name: Test Odoo Addons

on:
  push:
    branches: ['13.0', '14.0', '15.0', '16.0', '17.0', '18.0', '19.0']
  pull_request:
    branches: [main, '13.0', '14.0', '15.0', '16.0', '17.0', '18.0', '19.0']

jobs:
  # Detect which modules were changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Detect changed modules
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # For PR, compare with base branch
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            # For push, compare with previous commit
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi
          
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Extract module names from changed files
          MODULES=""
          for file in $CHANGED_FILES; do
            # Get the top-level directory (module name)
            MODULE=$(echo "$file" | cut -d'/' -f1)
            
            # Check if it's a valid module directory
            if [ -d "$MODULE" ] && [ -f "$MODULE/__manifest__.py" ]; then
              if [[ ! "$MODULES" =~ "$MODULE" ]]; then
                if [ -z "$MODULES" ]; then
                  MODULES="$MODULE"
                else
                  MODULES="$MODULES,$MODULE"
                fi
              fi
            fi
          done
          
          # If no modules detected, test all modules for this branch
          if [ -z "$MODULES" ]; then
            echo "No specific modules detected, will test all modules for this branch"
            # Read from catalog.json
            BRANCH="${{ github.ref_name }}"
            MODULES=$(python3 -c "
          import json
          with open('catalog.json') as f:
              config = json.load(f)
          modules = [m for m, info in config['modules'].items() if '$BRANCH' in info['supported_versions']]
          print(','.join(modules))
          ")
          fi
          
          echo "Modules to test: $MODULES"
          echo "modules=$MODULES" >> $GITHUB_OUTPUT

  # Dynamic test matrix - tests only changed modules
  test:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: ${{ needs.detect-changes.outputs.modules != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Odoo 13.0
          - odoo_version: '13.0'
            postgres_version: '12'
            test_db: 'test_13'
            
          # Odoo 14.0
          - odoo_version: '14.0'
            postgres_version: '12'
            test_db: 'test_14'
            
          # Odoo 15.0
          - odoo_version: '15.0'
            postgres_version: '15'
            test_db: 'test_15'
            
          # Odoo 16.0
          - odoo_version: '16.0'
            postgres_version: '15'
            test_db: 'test_16'
            
          # Odoo 17.0
          - odoo_version: '17.0'
            postgres_version: '15'
            test_db: 'test_17'
            
          # Odoo 18.0
          - odoo_version: '18.0'
            postgres_version: '15'
            test_db: 'test_18'
            
          # Odoo 19.0
          - odoo_version: '19.0'
            postgres_version: '15'
            test_db: 'test_19'
    
    services:
      postgres:
        image: postgres:${{ matrix.postgres_version }}
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Filter modules for this branch
        id: filter
        run: |
          BRANCH="${{ matrix.odoo_version }}"
          ALL_MODULES="${{ needs.detect-changes.outputs.modules }}"
          
          # Filter modules that support this Odoo version
          FILTERED_MODULES=$(python3 -c "
          import json
          
          with open('catalog.json') as f:
              config = json.load(f)
          
          all_modules = '$ALL_MODULES'.split(',')
          filtered = [m for m in all_modules if '$BRANCH' in config['modules'][m]['supported_versions']]
          print(','.join(filtered))
          ")
          
          echo "Filtered modules for $BRANCH: $FILTERED_MODULES"
          echo "modules=$FILTERED_MODULES" >> $GITHUB_OUTPUT
      
      - name: Skip if no modules for this version
        if: ${{ steps.filter.outputs.modules == '' }}
        run: echo "No modules to test for this Odoo version"
      
      - name: Wait for PostgreSQL
        if: ${{ steps.filter.outputs.modules != '' }}
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U odoo; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
      
      - name: Run tests with Odoo ${{ matrix.odoo_version }}
        if: ${{ steps.filter.outputs.modules != '' }}
        run: |
          MODULES="${{ steps.filter.outputs.modules }}"
          
          echo "Testing modules: $MODULES"
          echo "Odoo version: ${{ matrix.odoo_version }}"
          
          # Convert comma-separated to space-separated for -i parameter
          MODULES_SPACE=$(echo "$MODULES" | tr ',' ' ')
          
          # Convert comma-separated to tag format for --test-tags parameter
          # e.g., "oql,oql_web" becomes "/oql,/oql_web"
          TEST_TAGS=$(echo "$MODULES" | sed 's/,/\//g' | sed 's/^/\//' )
          
          echo "Test tags: $TEST_TAGS"
          
          docker run --rm \
            --network host \
            -v $(pwd):/mnt/extra-addons \
            -e HOST=localhost \
            -e PORT=5432 \
            -e USER=odoo \
            -e PASSWORD=odoo \
            odoo:${{ matrix.odoo_version }} \
            odoo -i $MODULES_SPACE \
                 --test-enable \
                 --test-tags $TEST_TAGS \
                 --stop-after-init \
                 -d ${{ matrix.test_db }} \
                 --db_host=localhost \
                 --db_port=5432 \
                 --db_user=odoo \
                 --db_password=odoo \
                 --log-level=warn 2>&1 | tee /tmp/odoo_output.log
        env:
          PGPASSWORD: odoo

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: odoo-logs-${{ matrix.odoo_version }}
          path: /tmp/odoo_output.log
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linting tools
        run: |
          pip install pylint
          pip install pylint-odoo

      - name: Run pylint on all modules
        run: |
          python3 -c "
          import json
          with open('catalog.json') as f:
              config = json.load(f)
          for module in config['modules'].keys():
              print(module)
          " | while read module; do
            if [ -d "$module" ]; then
              echo "Linting $module..."
              pylint --load-plugins=pylint_odoo \
                     --rcfile=/dev/null \
                     "$module/" || true
            fi
          done
