name: Test MCP Base Compatibility

on:
  push:
    branches: ['12.0', '13.0', '14.0', '15.0', '16.0', '17.0', '18.0', '19.0']
  pull_request:
    branches: [main, '12.0', '13.0', '14.0', '15.0', '16.0', '17.0', '18.0', '19.0']

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Map branch to Odoo version for testing
    strategy:
      matrix:
        include:
          # Test the version matching the current branch or PR target
          - odoo-version: ${{ (github.ref == 'refs/heads/12.0' || github.base_ref == '12.0') && '12.0' || 'skip' }}
            postgres-version: '12'
          - odoo-version: ${{ (github.ref == 'refs/heads/13.0' || github.base_ref == '13.0') && '13.0' || 'skip' }}
            postgres-version: '12'
          - odoo-version: ${{ (github.ref == 'refs/heads/14.0' || github.base_ref == '14.0') && '14.0' || 'skip' }}
            postgres-version: '12'
          - odoo-version: ${{ (github.ref == 'refs/heads/15.0' || github.base_ref == '15.0') && '15.0' || 'skip' }}
            postgres-version: '15'
          - odoo-version: ${{ (github.ref == 'refs/heads/16.0' || github.base_ref == '16.0') && '16.0' || 'skip' }}
            postgres-version: '15'
          - odoo-version: ${{ (github.ref == 'refs/heads/17.0' || github.base_ref == '17.0') && '17.0' || 'skip' }}
            postgres-version: '15'
          - odoo-version: ${{ (github.ref == 'refs/heads/18.0' || github.base_ref == '18.0') && '18.0' || 'skip' }}
            postgres-version: '15'
          - odoo-version: ${{ (github.ref == 'refs/heads/19.0' || github.base_ref == '19.0') && '19.0' || 'skip' }}
            postgres-version: '15'
      
      fail-fast: false
    
    # Skip jobs marked as 'skip'
    if: ${{ matrix.odoo-version != 'skip' }}
    
    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run tests with Odoo ${{ matrix.odoo-version }} Docker
        run: |
          docker run --rm \
            --network host \
            -v $(pwd):/mnt/extra-addons \
            odoo:${{ matrix.odoo-version }} \
            odoo -i mcp_base \
                 --test-enable \
                 --test-tags /mcp_base \
                 --stop-after-init \
                 -d test_mcp_${{ matrix.odoo-version }} \
                 --db_host=localhost \
                 --db_port=5432 \
                 --db_user=odoo \
                 --db_password=odoo \
                 --log-level=warn 2>&1 | tee /tmp/odoo_output.log
        env:
          PGPASSWORD: odoo

      - name: Check test results
        run: |
          if grep -q "FAIL\|ERROR" /tmp/odoo_output.log; then
            echo "❌ Tests failed for Odoo ${{ matrix.odoo-version }}!"
            grep -A 5 "FAIL\|ERROR" /tmp/odoo_output.log || true
            exit 1
          else
            echo "✅ All tests passed for Odoo ${{ matrix.odoo-version }}!"
          fi

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: odoo-logs-${{ matrix.odoo-version }}
          path: /tmp/odoo_output.log
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linting tools
        run: |
          pip install pylint
          pip install pylint-odoo

      - name: Run pylint
        run: |
          pylint --load-plugins=pylint_odoo \
                 --rcfile=/dev/null \
                 mcp_base/ || true
