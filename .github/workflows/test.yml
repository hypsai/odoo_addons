  test-15:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/15.0'
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools requests lxml_html_clean

      - name: Install Odoo 15.0
        run: pip install https://nightly.odoo.com/15.0/nightly/src/odoo_15.0.latest.tar.gz

      - name: Create Odoo configuration
        run: |
          WORKSPACE=$(pwd)
          cat > odoo.conf << EOF
          [options]
          addons_path = $WORKSPACE
          db_host = localhost
          db_port = 5432
          db_user = odoo
          db_password = odoo
          log_level = test
          logfile = /tmp/odoo_test.log
          EOF

      - name: Run Odoo tests
        run: |
          echo "Starting Odoo 15.0 tests..."
          odoo -c odoo.conf \
               -i mcp_base \
               --test-enable \
               --stop-after-init \
               -d test_mcp_15.0 \
               --db_host=localhost \
               --db_port=5432 \
               --db_user=odoo \
               --db_password=odoo \
               --log-level=debug 2>&1 | tee /tmp/odoo_output.log
        env:
          PGPASSWORD: odoo

