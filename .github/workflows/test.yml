  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linting tools
        run: |
          pip install pylint
          pip install pylint-odoo

      - name: Run pylint
        run: |
          pylint --load-plugins=pylint_odoo \
                 --rcfile=/dev/null \
                 mcp_base/ || true
