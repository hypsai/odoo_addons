name: Test Odoo Addons

on:
  push:
    branches: ['main', '13.0', '14.0', '15.0', '16.0', '17.0', '18.0', '19.0']
  pull_request:
    branches: ['main', '13.0', '14.0', '15.0', '16.0', '17.0', '18.0', '19.0']

jobs:
  # Detect which modules changed, and generate a dynamic test matrix
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
      matrix: ${{ steps.gen-matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed modules
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          MODULES=""
          for file in $CHANGED_FILES; do
            MODULE=$(echo "$file" | cut -d'/' -f1)
            if [ -d "$MODULE" ] && [ -f "$MODULE/__manifest__.py" ]; then
              if [[ ! "$MODULES" =~ "$MODULE" ]]; then
                if [ -z "$MODULES" ]; then
                  MODULES="$MODULE"
                else
                  MODULES="$MODULES,$MODULE"
                fi
              fi
            fi
          done

          echo "Changed modules: $MODULES"
          echo "modules=$MODULES" >> $GITHUB_OUTPUT

      - name: Generate test matrix
        id: gen-matrix
        run: |
          python3 -c "
          import json

          with open('catalog.json') as f:
              config = json.load(f)

          modules_str = '${{ steps.detect.outputs.modules }}'
          branch = '${{ github.ref_name }}'

          postgres_map = {
              '13.0': '12', '14.0': '12',
              '15.0': '15', '16.0': '15', '17.0': '15',
              '18.0': '15', '19.0': '15',
          }

          matrix_entries = []

          if modules_str:
              changed = modules_str.split(',')
          else:
              changed = []

          for m in changed:
              if m in config['modules']:
                  for ver in config['modules'][m]['supported_versions']:
                      # On a version branch, only test the matching Odoo version
                      if branch == 'main' or branch == ver:
                          matrix_entries.append({
                              'module': m,
                              'odoo_version': ver,
                              'postgres_version': postgres_map.get(ver, '15'),
                              'test_db': 'test_' + ver.replace('.', '')
                          })

          # Fallback: if no modules detected on a version branch push,
          # test all modules that support this version
          if not matrix_entries and branch != 'main':
              for m, info in config['modules'].items():
                  if branch in info['supported_versions']:
                      matrix_entries.append({
                          'module': m,
                          'odoo_version': branch,
                          'postgres_version': postgres_map.get(branch, '15'),
                          'test_db': 'test_' + branch.replace('.', '')
                      })

          if matrix_entries:
              result = json.dumps({'include': matrix_entries})
              print(f'Matrix: {result}')
              with open('/tmp/matrix.txt', 'w') as f:
                  f.write(f'matrix={result}')
          else:
              print('Matrix: (no entries — test job will be skipped)')
          "

          if [ -f /tmp/matrix.txt ]; then
            cat /tmp/matrix.txt >> $GITHUB_OUTPUT
          fi

  # Test each module on each Odoo version (dynamic matrix from detect-changes)
  test:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.matrix != ''
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}

    services:
      postgres:
        image: postgres:${{ matrix.postgres_version }}
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U odoo; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Run tests for ${{ matrix.module }} on Odoo ${{ matrix.odoo_version }}
        run: |
          MODULE="${{ matrix.module }}"
          ODOO_VERSION="${{ matrix.odoo_version }}"
          TEST_DB="${{ matrix.test_db }}"

          echo "Testing module: $MODULE"
          echo "Odoo version: $ODOO_VERSION"

          # Convert module name to test tag (e.g. "oql" → "/oql")
          TEST_TAG="/$MODULE"

          echo "Test tag: $TEST_TAG"

          set +e
          docker run --rm \
            --network host \
            -v $(pwd):/mnt/extra-addons \
            -e HOST=localhost \
            -e PORT=5432 \
            -e USER=odoo \
            -e PASSWORD=odoo \
            odoo:$ODOO_VERSION \
            odoo -i $MODULE \
                 --test-enable \
                 --test-tags $TEST_TAG \
                 --stop-after-init \
                 -d $TEST_DB \
                 --db_host=localhost \
                 --db_port=5432 \
                 --db_user=odoo \
                 --db_password=odoo \
                 --log-level=warn 2>&1 | tee /tmp/odoo_output.log

          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "Docker exit code: $EXIT_CODE"

          if grep -q "ERROR\|FAIL" /tmp/odoo_output.log; then
            echo "❌ Tests failed!"
            exit 1
          fi

          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Docker command failed with exit code $EXIT_CODE"
            exit 1
          fi

          echo "✅ All tests passed!"
        env:
          PGPASSWORD: odoo

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: odoo-logs-${{ matrix.module }}-${{ matrix.odoo_version }}
          path: /tmp/odoo_output.log
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linting tools
        run: |
          pip install pylint
          pip install pylint-odoo

      - name: Run pylint on all modules
        run: |
          python3 -c "
          import json
          with open('catalog.json') as f:
              config = json.load(f)
          for module in config['modules'].keys():
              print(module)
          " | while read module; do
            if [ -d "$module" ]; then
              echo "Linting $module..."
              pylint --load-plugins=pylint_odoo \
                     --rcfile=/dev/null \
                     "$module/" || true
            fi
          done
