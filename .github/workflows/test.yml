name: Test MCP Base Compatibility

on:
  push:
    branches: [main, '12.0', '13.0', '14.0', '15.0', '16.0', '17.0', '18.0', '19.0']
  pull_request:
    branches: [main]

jobs:
  test-12:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/12.0'
    
    services:
      postgres:
        image: postgres:12
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run tests with Odoo 12.0 Docker
        run: |
          docker run --rm \
            --network host \
            -v $(pwd):/mnt/extra-addons \
            -e HOST=localhost \
            -e PORT=5432 \
            -e USER=odoo \
            -e PASSWORD=odoo \
            odoo:12.0 \
            odoo -i mcp_base \
                 --test-enable \
                 --stop-after-init \
                 -d test_mcp_12.0 \
                 --db_host=localhost \
                 --db_port=5432 \
                 --db_user=odoo \
                 --db_password=odoo \
                 --log-level=test 2>&1 | tee /tmp/odoo_output.log
        env:
          PGPASSWORD: odoo

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: odoo-logs-12.0
          path: |
            /tmp/odoo_test.log
            /tmp/odoo_output.log
            ~/.local/share/Odoo/log/*.log
          retention-days: 7

